image: node:20

variables:
  FORCE_COLOR: "1"

before_script:
  - apt-get update -qq
  - apt-get upgrade -qqy
  - apt-get install -yqq vim links lynx git diffutils htop curl wget p7zip-full unzip zip sed gcc g++ make libfreetype6-dev libaio1 libaio-dev libonig-dev libpng-dev
  - npm install
  - npx playwright install --with-deps chromium

stages:
  - test

webship-js-test:
  stage: test
  script:
    - npm start &
    - sleep 3
    - npm test

  only:
    refs:
      - tags
      - branches